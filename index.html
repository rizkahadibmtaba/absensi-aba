<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2e7d32">

  <link rel="icon" type="image/png" sizes="192x192" href="https://raw.githubusercontent.com/rizkahadibmtaba/absensi-bmt-aba-assets/main/logo-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="https://raw.githubusercontent.com/rizkahadibmtaba/absensi-bmt-aba-assets/main/logo-512.png">
  <!-- <link rel="manifest" href="?manifest=true"> -->
  <link rel="manifest" href="https://script.google.com/macros/s/AKfycbzgvMgep0Qv-V32LjCFYe8Yh-vBKMcXXzFkskw8lbyLr6aF6HZ47c4E5PdSd-ffLee4/exec?manifest=true">
  <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/rizkahadibmtaba/absensi-bmt-aba-assets/main/logo-192.png">

  <title>Absensi Karyawan BMT ABA</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      margin: 0;
      background: #f4f6f9;
      font-size: 22px;
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    .container {
      background: white;
      padding: 25px;
      border-radius: 20px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 550px;
      box-sizing: border-box;
    }

    h2 {
      margin-bottom: 10px;
      color: #333;
      font-size: 30px;
      text-align: center;
      font-weight: bold;
    }

    #clock {
      font-size: 26px;
      font-weight: bold;
      color: #2196F3;
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 24px;
      font-weight: bold;
      margin-top: 10px;
      display: block;
    }

    input, select, button, textarea {
      width: 100%;
      padding: 16px;
      margin: 10px 0;
      border: 2px solid #ccc;
      border-radius: 12px;
      font-size: 22px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.3s;
      font-weight: bold;
      font-size: 26px;
    }

    button:hover {
      background: #45a049;
    }

    #takePhotoBtn {
      background: #2196F3;
      font-size: 26px;
    }

    #retakeBtn {
      background: #f44336;
      font-size: 26px;
      display: none;
    }

    video, canvas, img {
      width: 100% !important;
      height: auto !important;
      border-radius: 12px;
      margin-top: 12px;
    }

    video {
      transform: scaleX(-1);
    }

    #preview {
      display: none;
      border: 3px solid #ccc;
    }

    #thankyou {
      display: none;
      font-size: 26px;
      font-weight: bold;
      color: #2e7d32;
      text-align: center;
      margin-top: 25px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Absensi Karyawan BMT ABA</h2>
    <!-- Jam Realtime -->
    <div id="clock"></div>

    <form id="absenForm">
      
      <!-- Dropdown Nama -->
      <label for="nama">Nama Karyawan:</label>
      <select id="nama" name="nama" required>
        <option value="">-- Pilih Nama --</option>
        <option value="Dwi Arie Y">Dwi Arie Y</option>
        <option value="Suparto">Suparto</option>
        <option value="Susmiyati">Susmiyati</option>
        <option value="Edy S">Edy S</option>
        <option value="Fina Alviatur R">Fina Alviatur R</option>
        <option value="Noval S">Noval S</option>
        <option value="Zulfiana N A">Zulfiana N Adila</option>
        <option value="M Haris Husain">M Haris Husain</option>
      </select>

      <!-- ID Karyawan otomatis -->
      <label for="id">ID Karyawan:</label>
      <input type="text" id="id" name="id" placeholder="ID Karyawan" readonly required>

      <!-- Dropdown Keterangan -->
      <label for="status">Keterangan:</label>
      <select id="status" name="status" required>
        <option value="Hadir">Hadir</option>
        <option value="Sakit">Sakit</option>
        <option value="Izin Terlambat">Izin Terlambat</option>
        <option value="Cuti">Cuti</option>
      </select>

      <!-- Alasan jika sakit / izin -->
      <textarea id="alasan" name="alasan" placeholder="Tuliskan alasan (contoh: sakit kepala, urusan keluarga, dsb)" style="display:none;"></textarea>

      <!-- Hidden input untuk jam -->
      <input type="hidden" id="jam" name="jam">

      <!-- Kamera -->
      <div id="cameraSection">
        <video id="video" autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <button type="button" id="takePhotoBtn" onclick="takePhoto()">Ambil Foto</button>
        <button type="button" id="retakeBtn" onclick="retakePhoto()">Ulangi Foto</button>

        <!-- Preview Foto -->
        <img id="preview" />
        <input type="hidden" name="foto" id="foto">
      </div>

      <button type="submit">Submit Absensi</button>
    </form>

    <div id="thankyou">Terima kasih sudah absen 🙏</div>
  </div>

  <script>
    let video = document.getElementById("video");
    let stream;

    const karyawan = {
      "Dwi Arie Y": "ABA001",
      "Suparto": "ABA002",
      "Susmiyati": "ABA003",
      "Edy S": "ABA005",
      "Fina Alviatur R": "ABA006",
      "Noval S": "ABA007",
      "Zulfiana N A": "ABA008",
      "M Haris Husain": "ABA010"
    };

    document.getElementById("nama").addEventListener("change", function(){
      document.getElementById("id").value = karyawan[this.value] || "";
    });
      
    // Jam realtime
    function updateClock() {
      const now = new Date();
      const options = { hour: "2-digit", minute: "2-digit", second: "2-digit" };
      const timeString = now.toLocaleTimeString("id-ID", options);

      document.getElementById("clock").textContent = timeString;
      document.getElementById("jam").value = timeString; // simpan ke hidden input
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Kamera ON
    async function startCamera() {
      try {
        const constraints = { video: { facingMode: "user" } };
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;

        const track = stream.getVideoTracks()[0];
        const settings = track.getSettings();
        video.style.transform = settings.facingMode === "user" ? "scaleX(-1)" : "scaleX(1)";
      } catch (err) {
        alert("Kamera tidak bisa diakses: " + err);
      }
    }

    // Kamera OFF
    function stopCamera() {
      if (stream) {
        let tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
      }
    }

    // Kondisi dropdown status
    document.getElementById("status").addEventListener("change", function(){
      let value = this.value;
      let cameraSection = document.getElementById("cameraSection");
      let alasanField = document.getElementById("alasan");

      if(value === "Hadir"){
        cameraSection.style.display = "block";
        alasanField.style.display = "none";
        startCamera();
      } else {
        cameraSection.style.display = "none";
        alasanField.style.display = "block";
        stopCamera();
      }
    });

    function takePhoto() {
      const canvas = document.getElementById("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext("2d");

      const track = stream.getVideoTracks()[0];
      const settings = track.getSettings();
      if (settings.facingMode === "user") {
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
      }

      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      document.getElementById("foto").value = canvas.toDataURL("image/png");
      document.getElementById("preview").src = canvas.toDataURL("image/png");
      document.getElementById("preview").style.display = "block";

      video.style.display = "none";
      document.getElementById("takePhotoBtn").style.display = "none";
      document.getElementById("retakeBtn").style.display = "block";
    }

    function retakePhoto() {
      document.getElementById("preview").style.display = "none";
      document.getElementById("takePhotoBtn").style.display = "block";
      document.getElementById("retakeBtn").style.display = "none";
      video.style.display = "block";
      startCamera();
    }

    document.getElementById("absenForm").addEventListener("submit", async function(e){
      e.preventDefault();
      const submitBtn = document.querySelector("button[type='submit']");
      submitBtn.disabled = true;
      submitBtn.innerText = "Mengirim...";

      const formData = new FormData(document.getElementById("absenForm"));
      
      fetch("https://script.google.com/macros/s/AKfycbzgvMgep0Qv-V32LjCFYe8Yh-vBKMcXXzFkskw8lbyLr6aF6HZ47c4E5PdSd-ffLee4/exec", {
        method: "POST",
        body: formData
      }) 
      .then(() => {
        stopCamera();
        document.getElementById("absenForm").style.display = "none";
        document.getElementById("thankyou").style.display = "block";
      })
      .catch(err => {
        alert("❌ Gagal menyimpan absensi: " + err);
        submitBtn.disabled = false;
        submitBtn.innerText = "Submit Absensi";
      });
    });

    // Default kamera ON saat load (Hadir)
    startCamera();

    const fotoInput = document.getElementById("foto");

document.getElementById("status").addEventListener("change", function(){
  let value = this.value;
  let cameraSection = document.getElementById("cameraSection");
  let alasanField = document.getElementById("alasan");

  if(value === "Hadir"){
    cameraSection.style.display = "block";
    alasanField.style.display = "none";
    startCamera();
  } else {
    cameraSection.style.display = "none";
    alasanField.style.display = "block";
    stopCamera();
    fotoInput.value = ""; // sekarang tidak error
  }
});

  </script>
</body>
</html>
